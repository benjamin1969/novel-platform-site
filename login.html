<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灯市口小学五年级三班小说天地</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .content {
            padding: 40px;
        }
        
        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #e5e7eb;
        }
        
        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: #6b7280;
            transition: all 0.3s;
        }
        
        .tab.active {
            color: #4f46e5;
            border-bottom: 3px solid #4f46e5;
        }
        
        .form {
            display: none;
        }
        
        .form.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .password-input-wrapper {
            position: relative;
        }
        
        .password-input-wrapper input {
            padding-right: 50px;
        }
        
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #6b7280;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: color 0.3s;
        }
        
        .password-toggle:hover {
            color: #4f46e5;
            background: #f3f4f6;
        }
        
        .password-toggle svg {
            display: block;
        }
        }
        
        input:focus {
            outline: none;
            border-color: #4f46e5;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        
        .message.success {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }
        
        .message.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }
        
        .message.info {
            background: #dbeafe;
            color: #1e40af;
            display: block;
        }
        
        .links {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #6b7280;
        }
        
        .links a {
            color: #4f46e5;
            text-decoration: none;
            font-weight: 600;
        }
        
        .links a:hover {
            text-decoration: underline;
        }
        
        .note {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 13px;
            color: #6b7280;
        }
        
        .note strong {
            color: #374151;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>灯市口小学五年级三班小说天地</h1>
            <p>欢迎来到我们的创作空间</p>
        </div>
        
        <div class="content">
            <div class="tabs">
                <div class="tab active" onclick="showTab('login')">登录</div>
                <div class="tab" onclick="showTab('register')">注册</div>
            </div>
            
            <!-- 登录表单 -->
            <form id="loginForm" class="form active">
                <div class="form-group">
                    <label for="loginUsername">用户名</label>
                    <input type="text" id="loginUsername" placeholder="请输入用户名" required>
                </div>
                
                <div class="form-group">
                    <label for="loginPassword">密码</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="loginPassword" placeholder="请输入密码" required>
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility('loginPassword')">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="btn">登录</button>
                
                <div class="links">
                    还没有账号？ <a href="javascript:void(0)" onclick="showTab('register')">立即注册</a>
                </div>
            </form>
            
            <!-- 注册表单 -->
            <form id="registerForm" class="form">
                <div class="form-group">
                    <label for="registerUsername">用户名</label>
                    <input type="text" id="registerUsername" placeholder="请输入用户名（支持中文）" required>
                </div>
                
                <div class="form-group">
                    <label for="registerPassword">密码</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="registerPassword" placeholder="请输入密码（至少6位）" required>
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility('registerPassword')">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="invitationCode">邀请码</label>
                    <input type="text" id="invitationCode" placeholder="请输入邀请码" required>
                </div>
                
                <button type="submit" class="btn">注册</button>
                
                <div class="links">
                    已有账号？ <a href="javascript:void(0)" onclick="showTab('login')">立即登录</a>
                </div>
                
                <div class="note">
                    <strong>注册说明：</strong><br>
                    1. 用户名可以是中文或英文<br>
                    2. 邀请码请向管理员获取<br>
                    3. 注册成功后即可登录
                </div>
            </form>
            
            <div id="message" class="message"></div>
        </div>
    </div>

    <script>
        // API地址
        const API_URL = 'https://novel-platform-api.sunlongyun1030.workers.dev';
        
        // 切换密码显示/隐藏
        function togglePasswordVisibility(inputId) {
            const input = document.getElementById(inputId);
            const button = input.parentElement.querySelector('.password-toggle');
            
            if (input.type === 'password') {
                input.type = 'text';
                button.innerHTML = `
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                        <line x1="1" y1="1" x2="23" y2="23"></line>
                    </svg>
                `;
            } else {
                input.type = 'password';
                button.innerHTML = `
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                `;
            }
        }
        
        // 显示标签页
        function showTab(tabName) {
            // 更新标签
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelector(`.tab[onclick*="${tabName}"]`).classList.add('active');
            
            // 更新表单
            document.querySelectorAll('.form').forEach(form => {
                form.classList.remove('active');
            });
            document.getElementById(`${tabName}Form`).classList.add('active');
            
            // 清除消息
            clearMessage();
        }
        
        // 显示消息
        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
        }
        
        // 清除消息
        function clearMessage() {
            const messageEl = document.getElementById('message');
            messageEl.textContent = '';
            messageEl.className = 'message';
        }
        
        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            
            if (!username || !password) {
                showMessage('请输入用户名和密码', 'error');
                return;
            }
            
            showMessage('登录中...', 'info');
            
            try {
                // 登录API调用
                const response = await fetch(`${API_URL}/api/users/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: `${username}@dskxx.local`, // 临时邮箱格式
                        password: password
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    showMessage('登录成功！正在跳转...', 'success');
                    
                    // 保存token
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                    
                    // 3秒后跳转到首页
                    setTimeout(() => {
                        window.location.href = 'main.html';
                    }, 2000);
                } else {
                    showMessage(data.error || '登录失败，请检查用户名和密码', 'error');
                }
            } catch (error) {
                showMessage('网络错误，请稍后重试', 'error');
                console.error('登录错误:', error);
            }
        });
        
        // 注册表单提交
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('registerUsername').value.trim();
            const password = document.getElementById('registerPassword').value.trim();
            const invitationCode = document.getElementById('invitationCode').value.trim();
            
            if (!username || !password || !invitationCode) {
                showMessage('请填写所有必填字段', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('密码至少需要6位', 'error');
                return;
            }
            
            showMessage('注册中...', 'info');
            
            try {
                // 注册API调用
                const response = await fetch(`${API_URL}/api/users/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: username,
                        email: `${username}@dskxx.local`, // 自动生成邮箱
                        password: password,
                        invitationCode: invitationCode
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    showMessage('注册成功！请使用该账号登录', 'success');
                    
                    // 清空表单
                    document.getElementById('registerUsername').value = '';
                    document.getElementById('registerPassword').value = '';
                    document.getElementById('invitationCode').value = '';
                    
                    // 切换到登录标签
                    setTimeout(() => {
                        showTab('login');
                        document.getElementById('loginUsername').value = username;
                    }, 1500);
                } else {
                    showMessage(data.error || '注册失败', 'error');
                }
            } catch (error) {
                showMessage('网络错误，请稍后重试', 'error');
                console.error('注册错误:', error);
            }
        });
        
        // 检查是否已登录
        function checkLogin() {
            const token = localStorage.getItem('token');
            if (token) {
                // 如果已登录，跳转到首页
                window.location.href = 'main.html';
            }
        }
        
        // 页面加载时检查登录状态
        window.addEventListener('load', checkLogin);
        
        // 添加键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                // 当前激活的表单提交
                const activeForm = document.querySelector('.form.active');
                if (activeForm) {
                    const submitBtn = activeForm.querySelector('.btn');
                    if (submitBtn) {
                        submitBtn.click();
                    }
                }
            }
            
            // Ctrl+1 切换到登录，Ctrl+2 切换到注册
            if (e.ctrlKey) {
                if (e.key === '1') {
                    e.preventDefault();
                    showTab('login');
                } else if (e.key === '2') {
                    e.preventDefault();
                    showTab('register');
                }
            }
        });
        
        console.log('🚀 小说网站单页应用已加载');
        console.log('🔗 API地址:', API_URL);
        console.log('💡 邀请码: 2014');
    </script>
</body>
</html>
